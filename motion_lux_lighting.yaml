blueprint:
  name: Motion Sensor Light Blueprint
  domain: automation

  input:
    motion_sensor:
      name: Bewegingssensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion

    lux_sensor:
      name: Lux sensor
      selector:
        entity:
          domain: sensor
          device_class: illuminance

    day_scene:
      name: Dag scene
      selector:
        entity:
          domain: scene

    evening_scene:
      name: Avond scene
      selector:
        entity:
          domain: scene

    night_scene:
      name: Nacht scene
      selector:
        entity:
          domain: scene

    lights_to_turn_off:
      name: Lampen die uit mogen
      selector:
        target:
          entity:
            domain: light

    lux_threshold:
      name: Lux drempel voor inschakelen
      default: 30
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
          mode: slider

    no_motion_delay:
      name: Uitschakelvertraging
      default:
        minutes: 2
      selector:
        duration:

    day_start:
      name: Start dag
      default: "07:00:00"
      selector:
        time:

    evening_start:
      name: Start avond
      default: "18:00:00"
      selector:
        time:

    night_start:
      name: Start nacht
      default: "23:00:00"
      selector:
        time:

mode: restart
max_exceeded: silent

variables:
  day_start: !input day_start
  evening_start: !input evening_start
  night_start: !input night_start

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"
    id: motion_on

  - platform: state
    entity_id: !input motion_sensor
    to: "off"
    for: !input no_motion_delay
    id: motion_off

  - platform: numeric_state
    entity_id: !input lux_sensor
    below: !input lux_threshold
    id: dark_enough

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id:
              - motion_on
              - dark_enough
          - condition: state
            entity_id: !input motion_sensor
            state: "on"
          - condition: numeric_state
            entity_id: !input lux_sensor
            below: !input lux_threshold
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {% set t = now().strftime('%H:%M:%S') %}
                      {{ t >= night_start or t < day_start }}
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input night_scene

              - conditions:
                  - condition: template
                    value_template: >
                      {% set t = now().strftime('%H:%M:%S') %}
                      {{ t >= evening_start and t < night_start }}
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input evening_scene

            default:
              - service: scene.turn_on
                target:
                  entity_id: !input day_scene

      - conditions:
          - condition: trigger
            id: motion_off
        sequence:
          - service: light.turn_off
            target: !input lights_to_turn_off