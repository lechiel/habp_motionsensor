blueprint:
  name: Bewegingsverlichting met lux en optionele dag/avond/nacht scenes
  domain: automation

  input:
    motion_sensor:
      name: Bewegingssensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion

    lux_sensor:
      name: Lux sensor
      selector:
        entity:
          domain: sensor
          device_class: illuminance

    lux_threshold_on:
      name: Lux drempel inschakelen
      default: 30
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
          mode: slider

    lux_threshold_off:
      name: Lux drempel uitschakelen
      default: 80
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
          mode: slider

    no_motion_delay:
      name: Wachttijd na geen beweging
      default:
        minutes: 2
      selector:
        duration:

    use_day_scene:
      name: Dag scene gebruiken
      default: true
      selector:
        boolean:

    use_night_scene:
      name: Nacht scene gebruiken
      default: true
      selector:
        boolean:

    day_scene:
      name: Dag scene
      selector:
        entity:
          domain: scene

    evening_scene:
      name: Avond scene
      description: Wordt ook gebruikt als fallback als dag of nacht uit staat.
      selector:
        entity:
          domain: scene

    night_scene:
      name: Nacht scene
      selector:
        entity:
          domain: scene

    off_scene:
      name: Uit scene
      selector:
        entity:
          domain: scene

    day_start:
      name: Start dag
      default: "07:00:00"
      selector:
        time:

    evening_start:
      name: Start avond
      default: "18:00:00"
      selector:
        time:

    night_start:
      name: Start nacht
      default: "23:00:00"
      selector:
        time:

mode: restart
max_exceeded: silent

variables:
  day_start: !input day_start
  evening_start: !input evening_start
  night_start: !input night_start
  use_day_scene: !input use_day_scene
  use_night_scene: !input use_night_scene

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"
    id: motion_detected

  - platform: state
    entity_id: !input motion_sensor
    to: "off"
    for: !input no_motion_delay
    id: no_motion

  - platform: numeric_state
    entity_id: !input lux_sensor
    below: !input lux_threshold_on
    id: lux_below

condition: []

action:
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: motion_detected
              - condition: trigger
                id: lux_below
          - condition: state
            entity_id: !input motion_sensor
            state: "on"
          - condition: numeric_state
            entity_id: !input lux_sensor
            below: !input lux_threshold_on
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {% set t = now().strftime('%H:%M:%S') %}
                      {{ use_night_scene and (t >= night_start or t < day_start) }}
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input night_scene

              - conditions:
                  - condition: template
                    value_template: >
                      {% set t = now().strftime('%H:%M:%S') %}
                      {{ use_day_scene and t >= day_start and t < evening_start }}
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input day_scene

            default:
              - service: scene.turn_on
                target:
                  entity_id: !input evening_scene

      - conditions:
          - condition: trigger
            id: no_motion
          - condition: numeric_state
            entity_id: !input lux_sensor
            above: !input lux_threshold_off
        sequence:
          - service: scene.turn_on
            target:
              entity_id: !input off_scene