blueprint:
  name: Bewegingsverlichting met lux en optionele avond/nacht scenes
  domain: automation

  input:
    motion_sensor:
      name: Bewegingssensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion

    lux_sensor:
      name: Lux sensor
      selector:
        entity:
          domain: sensor
          device_class: illuminance

    day_scene:
      name: Dag scene
      selector:
        entity:
          domain: scene

    use_evening_scene:
      name: Avond scene gebruiken
      default: false
      selector:
        boolean:

    evening_scene:
      name: Avond scene
      default: ""
      selector:
        entity:
          domain: scene

    evening_start:
      name: Start avond
      default: "18:00:00"
      selector:
        time:

    use_night_scene:
      name: Nacht scene gebruiken
      default: false
      selector:
        boolean:

    night_scene:
      name: Nacht scene
      default: ""
      selector:
        entity:
          domain: scene

    night_start:
      name: Start nacht
      default: "23:00:00"
      selector:
        time:

    off_scene:
      name: Uit scene
      selector:
        entity:
          domain: scene

    lux_threshold_on:
      name: Lux drempel inschakelen
      default: 30
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
          mode: slider

    lux_threshold_off:
      name: Lux drempel uitschakelen
      default: 80
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
          mode: slider

    no_motion_delay:
      name: Wachttijd na geen beweging
      default:
        minutes: 2
      selector:
        duration:

mode: restart
max_exceeded: silent

variables:
  use_evening_scene: !input use_evening_scene
  use_night_scene: !input use_night_scene
  evening_scene: !input evening_scene
  night_scene: !input night_scene
  evening_start: !input evening_start
  night_start: !input night_start

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"
    id: motion_detected

  - platform: state
    entity_id: !input motion_sensor
    to: "off"
    for: !input no_motion_delay
    id: no_motion

  - platform: numeric_state
    entity_id: !input lux_sensor
    below: !input lux_threshold_on
    id: lux_below

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id:
              - motion_detected
              - lux_below
          - condition: state
            entity_id: !input motion_sensor
            state: "on"
          - condition: numeric_state
            entity_id: !input lux_sensor
            below: !input lux_threshold_on
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ use_night_scene and night_scene != '' and now().strftime('%H:%M:%S') >= night_start }}
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input night_scene

              - conditions:
                  - condition: template
                    value_template: >
                      {{ use_evening_scene and evening_scene != '' and now().strftime('%H:%M:%S') >= evening_start }}
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input evening_scene

            default:
              - service: scene.turn_on
                target:
                  entity_id: !input day_scene

      - conditions:
          - condition: trigger
            id: no_motion
          - condition: numeric_state
            entity_id: !input lux_sensor
            above: !input lux_threshold_off
        sequence:
          - service: scene.turn_on
            target:
              entity_id: !input off_scene