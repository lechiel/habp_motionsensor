blueprint:
  name: Bewegingsverlichting met lux en dag/avond/nacht scenes
  description: >
    Schakelt verlichting op basis van beweging en lux.
    Ondersteunt aparte dag-, avond- en nachtscenes.
    Bij geen beweging wordt een aparte "uit" scene geactiveerd.
    Uitschakelen gebeurt alleen als de lux boven de ingestelde uitschakeldrempel zit.

  domain: automation

  input:
    motion_sensor:
      name: Bewegingssensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion

    lux_sensor:
      name: Lux sensor
      selector:
        entity:
          domain: sensor
          device_class: illuminance

    lux_threshold_on:
      name: Lux drempel inschakelen
      description: Lampen gaan aan onder deze luxwaarde
      default: 30
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
          mode: slider

    lux_threshold_off:
      name: Lux drempel uitschakelen
      description: Lampen mogen uit boven deze luxwaarde
      default: 80
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
          mode: slider

    no_motion_delay:
      name: Wachttijd na geen beweging
      default:
        minutes: 2
      selector:
        duration:

    day_scene:
      name: Dag scene
      selector:
        entity:
          domain: scene

    evening_scene:
      name: Avond scene
      selector:
        entity:
          domain: scene

    night_scene:
      name: Nacht scene
      selector:
        entity:
          domain: scene

    off_scene:
      name: Uit scene
      description: Scene die actief wordt bij geen beweging
      selector:
        entity:
          domain: scene

    day_start:
      name: Start dag
      default: "07:00:00"
      selector:
        time:

    evening_start:
      name: Start avond
      default: "18:00:00"
      selector:
        time:

    night_start:
      name: Start nacht
      default: "23:00:00"
      selector:
        time:

mode: restart
max_exceeded: silent

variables:
  day_start: !input day_start
  evening_start: !input evening_start
  night_start: !input night_start

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"
    id: motion_detected

  - platform: state
    entity_id: !input motion_sensor
    to: "off"
    for: !input no_motion_delay
    id: no_motion

  - platform: numeric_state
    entity_id: !input lux_sensor
    below: !input lux_threshold_on
    id: lux_below

condition: []

action:
  - choose:

      #########################################################
      # VERLICHTING AAN
      #########################################################

      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: motion_detected
              - condition: trigger
                id: lux_below

          - condition: state
            entity_id: !input motion_sensor
            state: "on"

          - condition: numeric_state
            entity_id: !input lux_sensor
            below: !input lux_threshold_on

        sequence:

          - choose:

              #################################################
              # NACHT
              #################################################

              - conditions:
                  - condition: template
                    value_template: >
                      {% set t = now().strftime('%H:%M:%S') %}
                      {{ t >= night_start or t < day_start }}

                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input night_scene

              #################################################
              # AVOND
              #################################################

              - conditions:
                  - condition: template
                    value_template: >
                      {% set t = now().strftime('%H:%M:%S') %}
                      {{ t >= evening_start and t < night_start }}

                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: !input evening_scene

            ###################################################
            # DAG
            ###################################################

            default:
              - service: scene.turn_on
                target:
                  entity_id: !input day_scene

      #########################################################
      # VERLICHTING UIT
      #########################################################

      - conditions:
          - condition: trigger
            id: no_motion

          - condition: numeric_state
            entity_id: !input lux_sensor
            above: !input lux_threshold_off

        sequence:
          - service: scene.turn_on
            target:
              entity_id: !input off_scene